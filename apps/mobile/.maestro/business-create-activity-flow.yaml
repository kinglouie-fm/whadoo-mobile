appId: com.kinglouie-fm.whadoo
---
# Business Journey: Verify business features
- launchApp
- assertVisible: "Business"

# Step 1: Verify we're on business home (look for KPI cards)
- assertVisible: "Quick actions"
- assertVisible: "Today"
- assertVisible: "Upcoming"
- assertVisible: "Revenue"

# Step 2: Navigate to activities via tab bar
- tapOn:
    point: "39%,91%"
- extendedWaitUntil:
    visible: "Manage Activities"
    timeout: 3000

# Step 3: Navigate to availability via tab bar
- tapOn:
    point: "61%,91%"
- extendedWaitUntil:
    visible: "Manage Availabilities"
    timeout: 3000

# Step 4: Navigate back to home via tab bar
- tapOn:
    point: "16%,91%"
- assertVisible: "Quick actions"

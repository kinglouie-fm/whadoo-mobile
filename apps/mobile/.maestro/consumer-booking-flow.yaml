appId: com.kinglouie-fm.whadoo
---
# Consumer Journey: Complete booking flow (assumes user is logged in)
- launchApp
- assertVisible: "Your Location"

# Step 1: Navigate to saved tab (tap center-left of bottom nav)
- tapOn:
    point: "30%,95%"
- assertVisible: "Saved"

# Step 2: Navigate to bookings tab (tap center-right of bottom nav)
- tapOn:
    point: "70%,95%"
- assertVisible: "My Bookings"

# Step 3: Navigate to profile tab (tap far right of bottom nav)
- tapOn:
    point: "90%,95%"
- assertVisible: "Settings"

# Step 4: Return to discovery tab (tap far left of bottom nav)
- tapOn:
    point: "10%,95%"
- assertVisible: "Your Location"
